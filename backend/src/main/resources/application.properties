spring.application.name=backend

# Datasource — usa as envs (mesmos nomes do .env da raiz); sem env definida, cai nos defaults de dev
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:girassol}
spring.datasource.username=${POSTGRES_USER:girassol}
spring.datasource.password=${POSTGRES_PASSWORD:girassol}

# Schema é responsabilidade do Flyway; o Hibernate só valida
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
